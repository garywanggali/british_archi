<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>筑梦大英 Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <canvas id="game" aria-label="筑梦大英"></canvas>
      <div class="hud" aria-hidden="true">
        <div class="hud__row">
          <div class="hud__pill" id="hudStructure">Structure: -</div>
          <div class="hud__pill" id="hudStyle">Style: -</div>
          <div class="hud__pill" id="hudMaterial">Material: 0</div>
        </div>
        <div class="hud__row hud__row--help" id="hudHelp">
          ←/→ 或滑动 选择 / 变道
        </div>
      </div>
      <div class="overlay" id="overlay" hidden>
        <div class="overlay__panel">
          <div class="overlay__title" id="overlayTitle">筑梦大英</div>
          <div class="overlay__subtitle" id="overlaySubtitle">左右滑动选择，两次选择 + 收集材料，生成真实英国建筑</div>
          <button class="overlay__button" id="overlayButton" type="button">开始</button>
        </div>
      </div>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
